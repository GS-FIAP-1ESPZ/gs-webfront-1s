<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" preserveAspectRatio="xMidYMid slice">
    <defs>
        <radialGradient id="ceu3" cx="70%" cy="30%" r="90%">
            <stop offset="0%" stop-color="#2a1147"/>
            <stop offset="100%" stop-color="#0a0618"/>
        </radialGradient>
        <radialGradient id="planeta" cx="40%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#5b1ea6"/>
        </radialGradient>
    </defs>

    <rect width="1100" height="450" fill="url(#ceu3)"/>

    <!-- estrelas -->
    <g fill="#ffffff">
        <circle cx="100" cy="70" r="2"/>
        <circle cx="250" cy="40" r="1.5"/>
        <circle cx="430" cy="90" r="2"/>
        <circle cx="610" cy="50" r="1.5"/>
        <circle cx="170" cy="160" r="1.5"/>
        <circle cx="350" cy="200" r="1.5"/>
        <circle cx="520" cy="150" r="1.5"/>
    </g>

    <!-- planeta com anel -->
    <g transform="translate(880 320)">
        <circle r="120" fill="url(#planeta)"/>
        <ellipse rx="180" ry="40" fill="none" stroke="#d8b4fe" stroke-width="10" opacity="0.7" transform="rotate(-20)"/>
    </g>

    <!-- satelite com antena -->
    <g transform="translate(320 200)">
        <rect x="-20" y="-18" width="40" height="36" rx="5" fill="#e9e3ff"/>
        <rect x="-78" y="-12" width="50" height="24" fill="#a855f7"/>
        <rect x="28" y="-12" width="50" height="24" fill="#a855f7"/>
        <line x1="-28" y1="0" x2="-78" y2="0" stroke="#cbb6ef" stroke-width="2"/>
        <line x1="28" y1="0" x2="78" y2="0" stroke="#cbb6ef" stroke-width="2"/>
        <!-- antena parabolica -->
        <ellipse cx="0" cy="-30" rx="18" ry="10" fill="#f3e9ff" transform="rotate(25)"/>
        <line x1="0" y1="-20" x2="0" y2="18" stroke="#cbb6ef" stroke-width="2"/>

        <!-- ondas de sinal -->
        <g fill="none" stroke="#ffd166" stroke-width="3" opacity="0.85">
            <path d="M20 -40 q25 25 0 55"/>
            <path d="M35 -52 q40 42 0 80"/>
            <path d="M50 -64 q55 60 0 108"/>
        </g>
    </g>
</svg>
